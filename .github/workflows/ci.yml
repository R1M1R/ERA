name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify backend imports
        env:
          PYTHONPATH: ${{ github.workspace }}
          ERA_SERVER_SALT: ci-test-salt
          DATABASE_URL: postgresql+asyncpg://era:era@localhost:5432/era_db
          DATABASE_URL_SYNC: postgresql+psycopg2://era:era@localhost:5432/era_db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test
        run: python -c "from backend.main import app; print(app.version)"

      - name: Validate production compose file
        run: docker compose -f backend/production.docker-compose.yml config

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.example.com
        run: npm run build
