name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_USER: era
  POSTGRES_PASSWORD: era_ci_secret
  POSTGRES_DB: era_db
  DATABASE_URL: postgresql+asyncpg://era:era_ci_secret@postgres:5432/era_db
  DATABASE_URL_SYNC: postgresql+psycopg2://era:era_ci_secret@postgres:5432/era_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  OPENAI_API_KEY: sk-ci-test-key
  OPENAI_MODEL: gpt-4o-mini
  ERA_SERVER_SALT: ci-test-salt
  CORS_ORIGINS: http://localhost:5173

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify backend imports
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "from main import app; print(app.version)"

      - name: Test steganography roundtrip
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}
          ERA_SERVER_SALT: ci-test-salt
        run: |
          python - <<'PY'
          from steganography import SteganographyGenerator, compute_authenticity_hash
          gen = SteganographyGenerator(64, 64)
          path, auth_hash = gen.encode_authenticated_text_to_image("CI riddle", "artifacts/ci-test.png")
          payload = gen.decode_authenticated_payload(path)
          assert payload.text == "CI riddle"
          assert payload.authenticity_hash == auth_hash
          assert compute_authenticity_hash("CI riddle") == auth_hash
          print("steganography ok")
          PY

      - name: Test pipeline result is JSON-serializable
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}
          ERA_SERVER_SALT: ci-test-salt
        run: |
          python - <<'PY'
          import json
          from worker.tasks import build_pipeline_result
          from backend.llm_service import HistoryRiddle

          result = build_pipeline_result(
              artifact_id="ci-task",
              riddle=HistoryRiddle(riddle="CI riddle", answer="answer"),
              artifact={
                  "artifact_id": "ci-task",
                  "image_path": "/tmp/ci.png",
                  "authenticity_hash": "abc123",
                  "image_base64": "aGVsbG8=",
              },
              db_record={"public_hash": "deadbeef", "image_url": "/artifacts/deadbeef/image"},
          )
          json.dumps(result)
          assert "image_bytes" not in result
          print("pipeline result serialization ok")
          PY

      - name: Run backend pytest suite
        env:
          PYTHONPATH: ${{ github.workspace }}
          ERA_STANDALONE: "true"
          ERA_DEMO_MODE: "true"
          ERA_SERVER_SALT: ci-test-salt
          DATABASE_URL: ""
          DATABASE_URL_SYNC: ""
        run: pytest backend/tests -q

      - name: E2E standalone mode (SQLite + in-process Celery)
        env:
          PYTHONPATH: ${{ github.workspace }}
          ERA_STANDALONE: "true"
          ERA_DEMO_MODE: "true"
          ERA_SERVER_SALT: ci-test-salt
          DATABASE_URL: ""
          DATABASE_URL_SYNC: ""
        run: python backend/scripts/e2e_standalone.py

      - name: Verify PaaS artifact model
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          from models import Artifact
          assert "image_bytes" in Artifact.__table__.columns
          print("paas image_bytes column ok")
          PY

      - name: Verify Pro license model
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          from models import ProLicense
          assert "api_key_hash" in ProLicense.__table__.columns
          assert "lemon_subscription_id" in ProLicense.__table__.columns
          print("pro_licenses table ok")
          PY

      - name: Validate Render blueprints
        run: |
          python -c "
          import pathlib
          lite = pathlib.Path('render.yaml').read_text()
          full = pathlib.Path('render-full.yaml').read_text()
          security = pathlib.Path('SECURITY.md').read_text()
          assert 'era-api' in lite and 'ERA_STANDALONE' in lite
          assert 'era-api' in full and 'era-celery' in full
          assert 'ERA_SERVER_SALT' in security
          print('render.yaml + render-full.yaml + SECURITY.md ok')
          "

      - name: Validate production compose file
        run: docker compose -f backend/production.docker-compose.yml config

      - name: Validate Oracle Cloud compose overlay
        run: docker compose -f backend/production.docker-compose.yml -f deploy/oracle-cloud/compose.override.yml config

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://api.example.com
        run: npm run build
