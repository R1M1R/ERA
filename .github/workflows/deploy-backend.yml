name: Deploy Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    if: github.repository == 'R1M1R/ERA'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            INSTALL_DIR="${INSTALL_DIR:-$HOME/ERA}"
            if [ ! -d "$INSTALL_DIR/.git" ]; then
              echo "Repository not found at $INSTALL_DIR"
              echo "Run scripts/server-first-deploy.sh on the server first."
              exit 1
            fi
            cd "$INSTALL_DIR"
            git pull origin main
            docker compose --env-file .env -f backend/production.docker-compose.yml up -d --build
            docker compose --env-file .env -f backend/production.docker-compose.yml ps
            curl -fsS http://127.0.0.1:8000/health
