name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      oci_profile:
        description: "Use Oracle Cloud resource profile (lighter Gunicorn/Celery)"
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    if: github.repository == 'R1M1R/ERA'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v7

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu
            INSTALL_DIR="${INSTALL_DIR:-$HOME/ERA}"
            if [ ! -d "$INSTALL_DIR/.git" ]; then
              echo "Repository not found at $INSTALL_DIR"
              echo "Run scripts/oracle-cloud-bootstrap.sh on the server first."
              exit 1
            fi
            cd "$INSTALL_DIR"
            git pull origin main
            COMPOSE_ARGS="--env-file .env -f backend/production.docker-compose.yml"
            if [ "${{ inputs.oci_profile }}" = "true" ]; then
              COMPOSE_ARGS="$COMPOSE_ARGS -f deploy/oracle-cloud/compose.override.yml"
            fi
            docker compose $COMPOSE_ARGS up -d --build
            docker compose $COMPOSE_ARGS ps
            curl -fsS http://127.0.0.1:8000/health
