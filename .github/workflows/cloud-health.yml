name: Cloud health (live)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  verify-live:
    if: github.repository == 'R1M1R/ERA'
    runs-on: ubuntu-latest
    steps:
      - name: Check live ERA stack
        run: |
          URL="https://frontend-flax-two-11q4abvz2o.vercel.app"
          echo "GET $URL/health"
          curl -fsS "$URL/health" | tee health.json
          python3 -c "
          import json
          data = json.load(open('health.json'))
          assert data.get('status') == 'ok', data
          assert 'openai_for_pro' in data, data
          assert 'database_persistent' in data, data
          print('Live health OK')
          "

      - name: Report production readiness flags
        run: |
          python3 -c "
          import json
          data = json.load(open('health.json'))
          flags = {
              'production_ready': 'Complete owner setup: SETUP-PRODUCTION.bat + SYNC-VERCEL.bat',
              'database_persistent': 'Set DATABASE_URL on Vercel (scripts/setup-neon-vercel.ps1)',
              'billing_configured': 'Set LEMONSQUEEZY_WEBHOOK_SECRET on Vercel',
              'openai_for_pro': 'Set OPENAI_API_KEY on Vercel for Pro GPT riddles',
          }
          for key, hint in flags.items():
              if not data.get(key):
                  print(f'::warning title=Production setup::{key} is false. {hint}')
          "

      - name: Check Pro status endpoint
        run: |
          URL="https://frontend-flax-two-11q4abvz2o.vercel.app"
          curl -fsS "$URL/pro/status" | tee pro-status.json
          python3 -c "
          import json
          data = json.load(open('pro-status.json'))
          assert data.get('tier') == 'free', data
          print('Pro status OK')
          "

      - name: Check OpenAPI schema exposes billing routes
        run: |
          URL="https://frontend-flax-two-11q4abvz2o.vercel.app"
          curl -fsS "$URL/openapi.json" | tee openapi.json
          python3 -c "
          import json
          paths = json.load(open('openapi.json')).get('paths', {})
          for route in ('/health', '/pro/status', '/webhooks/lemonsqueezy'):
              assert route in paths, paths
          print('OpenAPI OK')
          "

      - name: Smoke generate and sanitized status
        run: |
          URL="https://frontend-flax-two-11q4abvz2o.vercel.app"
          TASK=$(curl -fsS -X POST "$URL/generate" | python3 -c "import json,sys; print(json.load(sys.stdin)['task_id'])")
          echo "task_id=$TASK"
          for i in $(seq 1 30); do
            curl -fsS "$URL/status/$TASK" | tee status.json
            python3 -c "
          import json, sys
          data = json.load(open('status.json'))
          status = data.get('status')
          if status == 'completed':
              result = data.get('result') or {}
              assert 'authenticity_hash' not in result, result
              assert 'image_path' not in result, result
              print('completed with sanitized result')
              sys.exit(0)
          if status == 'failed':
              sys.exit(1)
          "
            sleep 2
          done
          exit 1
