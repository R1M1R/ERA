server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    root /var/www/era-frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

