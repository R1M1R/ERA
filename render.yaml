# Render Blueprint — ERA Lite (24/7 cloud, zero external keys)
# One-click: https://render.com/deploy?repo=https://github.com/R1M1R/ERA
#
# Uses ERA_STANDALONE (SQLite + in-process Celery). No Neon or Upstash required.
# Gallery data may reset after Render cold start (free tier). For persistent DB use render-full.yaml.

services:
  - type: web
    name: era-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: GUNICORN_WORKERS
        value: "1"
      - key: ERA_STANDALONE
        value: "true"
      - key: ERA_DEMO_MODE
        value: "true"
      - key: ERA_SERVER_SALT
        generateValue: true
      - key: CORS_ORIGINS
        value: https://frontend-flax-two-11q4abvz2o.vercel.app,https://frontend-uer-s-projects.vercel.app,https://frontend-r1m1r-uer-s-projects.vercel.app
      - key: OPENAI_API_KEY
        value: ""
